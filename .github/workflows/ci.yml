name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 — Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step 3 — Install Backend Dependencies
      - name: Install Backend Dependencies
        run: |
          cd todo-app/backend
          npm install

      # Step 4 — Run Backend Tests
      - name: Run Backend Tests
        run: |
          cd todo-app/backend
          npm test

      # Step 5 — Install Frontend Dependencies
      - name: Install Frontend Dependencies
        run: |
          cd todo-app/frontend
          npm install

      # Step 6 — Build Frontend
      - name: Build Frontend
        run: |
          cd todo-app/frontend
          npm run build

      # Step 7 — Run Frontend Tests
      - name: Run Frontend Tests
        run: |
          cd todo-app/frontend
          npm test

      # Step 8 — Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 9 — Build and Push Backend Docker Image
      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/be-todo:02240365 \
            ./todo-app/backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/be-todo:02240365

      # Step 10 — Build and Push Frontend Docker Image
      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fe-todo:02240365 \
            ./todo-app/frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fe-todo:02240365

      # Step 11 — Deploy Backend to Render
      - name: Deploy Backend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_HOOK }}"

      # Step 12 — Deploy Frontend to Render
      - name: Deploy Frontend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_HOOK }}"

      # Step 13 — Confirm Deployment
      - name: Deployment Complete
        run: echo "✅ Build, Test and Deploy completed successfully!"